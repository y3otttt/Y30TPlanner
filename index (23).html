<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Intern Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#fdf4f9;color:#5a3f5a;min-height:100vh}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(255,179,209,.22),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(180,215,255,.22),transparent 70%);pointer-events:none;z-index:0}

/* ── HEADER ── */
.hdr{background:rgba(255,255,255,.92);border-bottom:1.5px solid rgba(255,183,210,.3);padding:0 1.5rem;position:relative;z-index:10}
.hdr-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;gap:.75rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-ico{width:34px;height:34px;background:linear-gradient(135deg,#ffb3d1,#b3d4ff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-t{font-size:.9rem;font-weight:700;color:#f06292}
.logo-s{font-size:.62rem;color:#c0a0c0}
.nav-c{display:flex;align-items:center;gap:.5rem}
.wbtn{width:28px;height:28px;border-radius:50%;border:1.5px solid #ffb3d1;background:#fff0f6;cursor:pointer;font-size:.75rem;color:#f06292;display:flex;align-items:center;justify-content:center}
.wbtn:hover{background:#ffdaec}
.nav-lbl{font-size:.82rem;font-weight:700;color:#5a3f5a;min-width:190px;text-align:center}
.tbtn{padding:.28rem .85rem;border-radius:50px;border:1.5px solid #ffb3d1;background:transparent;cursor:pointer;font-size:.72rem;font-weight:600;color:#f06292}
.tbtn:hover{background:#fff0f6}
.nav-r{display:flex;align-items:center;gap:.5rem}
.vtabs{display:flex;gap:3px;background:rgba(255,255,255,.7);border-radius:50px;padding:3px;border:1.5px solid rgba(255,183,210,.28)}
.vtab{padding:.28rem .85rem;border-radius:50px;border:none;background:transparent;cursor:pointer;font-size:.72rem;font-weight:600;color:#c0a0c0}
.vtab:hover{color:#f06292}
.vtab.on{background:linear-gradient(135deg,#ffb3d1,#f06292);color:#fff;box-shadow:0 2px 8px rgba(240,98,146,.28)}
.expbtn{padding:.28rem .85rem;border-radius:50px;border:1.5px solid #b3d4ff;background:transparent;cursor:pointer;font-size:.72rem;font-weight:600;color:#5aaaf0}
.expbtn:hover{background:#f0f7ff}

/* ── MAIN ── */
.main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.view{display:none}.view.on{display:block}

/* ── WEEK GRID ── */
.grid-wrap{border-radius:16px;overflow:hidden;border:1.5px solid rgba(255,183,210,.25);background:#fff;box-shadow:0 4px 20px rgba(200,130,180,.1);margin-bottom:1.25rem}
.grid-hdr{display:grid;grid-template-columns:48px repeat(7,1fr);background:rgba(255,240,246,.85);border-bottom:1.5px solid rgba(255,183,210,.2)}
.g-corner{padding:.55rem;border-right:1px solid rgba(255,183,210,.15)}
.g-dhead{padding:.55rem .4rem;text-align:center;cursor:pointer;border-right:1px solid rgba(255,183,210,.12)}
.g-dhead:last-child{border-right:none}
.g-dhead:hover{background:rgba(255,220,236,.4)}
.g-dhead.is-today{background:linear-gradient(135deg,rgba(255,210,230,.5),rgba(210,235,255,.4))}
.g-dn{font-size:.62rem;font-weight:600;color:#c0a0c0;text-transform:uppercase;letter-spacing:.04em}
.g-num{font-size:1.05rem;font-weight:700;color:#5a3f5a;line-height:1.2;margin-top:2px}
.g-num.tday{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ffb3d1,#f06292);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin:2px auto 0;box-shadow:0 2px 6px rgba(240,98,146,.3)}
.g-mo{font-size:.58rem;color:#c0a0c0;margin-top:1px}
.grid-body{display:grid;grid-template-columns:48px repeat(7,1fr)}
.g-rlbl{padding:.45rem 0;text-align:center;font-size:.55rem;color:#c0a0c0;font-weight:600;background:rgba(255,240,246,.4);border-right:1px solid rgba(255,183,210,.15)}
.g-cell{min-height:110px;padding:4px;border-right:1px solid rgba(255,183,210,.1);border-top:1px dashed rgba(255,183,210,.1);cursor:pointer;position:relative;background:rgba(255,255,255,.5)}
.g-cell:last-child{border-right:none}
.g-cell:hover{background:rgba(255,240,246,.5)}
.g-cell.tc{background:rgba(255,240,250,.35)}
.g-cell.wk{background:rgba(246,243,255,.4)}
.g-cell.wk:hover{background:rgba(240,235,252,.55)}
.add-h{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:.68rem;color:#ff85b3;pointer-events:none}
.g-cell:hover .add-h{display:flex}

/* ── CHIPS ── */
.chip{border-radius:7px;padding:4px 6px;font-size:.7rem;line-height:1.35;margin-bottom:3px;position:relative;word-break:break-word;overflow:hidden}
.chip:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.chip-img{width:100%;max-height:68px;object-fit:cover;border-radius:5px;margin-bottom:3px;display:block;cursor:zoom-in}
.chip-txt{font-size:.7rem;line-height:1.35}
.chip-acts{display:none;position:absolute;top:2px;right:2px;gap:2px}
.chip:hover .chip-acts{display:flex}
.cbtn{width:15px;height:15px;border-radius:3px;border:none;cursor:pointer;font-size:.55rem;display:flex;align-items:center;justify-content:center}
.cedit{background:rgba(255,255,255,.9);color:#7a5a7a}.cedit:hover{background:#e2d4ff}
.cdel{background:rgba(255,255,255,.9);color:#c07070}.cdel:hover{background:#ffe0e0}
.cpink   {background:#ffd6e8;color:#b84070;border-left:3px solid #f06292}
.cblue   {background:#d6eaff;color:#2860a8;border-left:3px solid #60a0f0}
.cmint   {background:#d0f4e8;color:#1a7a55;border-left:3px solid #40c090}
.clavender{background:#e2d4ff;color:#6040a8;border-left:3px solid #9070e0}
.cpeach  {background:#ffe4d0;color:#a05020;border-left:3px solid #f09050}

/* ── WEEKLY SUMMARY ── */
.sec-title{font-size:.9rem;font-weight:700;color:#5a3f5a;margin-bottom:.8rem;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,183,210,.4),transparent)}
.sum-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:.75rem}
.sum-card{background:rgba(255,255,255,.88);border-radius:13px;border:1.5px solid rgba(255,183,210,.22);padding:.75rem .65rem;min-height:75px;box-shadow:0 2px 8px rgba(200,130,180,.07)}
.sum-card.wk{border-color:rgba(200,183,255,.25);background:rgba(250,248,255,.9)}
.sum-day{font-size:.6rem;font-weight:700;color:#c0a0c0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sum-ul{list-style:none}
.sum-ul li{font-size:.7rem;color:#5a3f5a;line-height:1.4;padding:2px 0;border-bottom:1px dashed rgba(255,183,210,.15);display:flex;flex-direction:column;gap:1px}
.sum-ul li:last-child{border-bottom:none}
.sum-ul li::before{content:'·';color:#ff85b3;margin-right:3px}
.sum-img{width:100%;height:38px;object-fit:cover;border-radius:4px;margin-bottom:2px}
.sum-empty{font-size:.65rem;color:#c0a0c0;font-style:italic}
.stat-row{display:flex;gap:.6rem;flex-wrap:wrap}
.spill{padding:.38rem .85rem;border-radius:50px;background:rgba(255,255,255,.88);border:1.5px solid rgba(255,183,210,.22);font-size:.74rem;color:#7a5a7a;box-shadow:0 2px 6px rgba(200,130,180,.07)}
.spill b{color:#f06292;font-weight:700}

/* ── MONTHLY ── */
.month-nav{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.month-lbl{font-size:.85rem;font-weight:700;color:#5a3f5a;min-width:150px;text-align:center}
.mcal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;border-radius:14px;overflow:hidden;border:1.5px solid rgba(255,183,210,.22);background:rgba(255,183,210,.12);box-shadow:0 4px 18px rgba(200,130,180,.1);margin-bottom:1.1rem}
.mcal-dh{background:rgba(255,240,246,.9);padding:.4rem .25rem;text-align:center;font-size:.6rem;font-weight:700;color:#c0a0c0;text-transform:uppercase;letter-spacing:.04em}
.mcell{background:#fff;min-height:76px;padding:3px;cursor:pointer;position:relative}
.mcell:hover{background:rgba(255,240,246,.65)}
.mcell.other{background:rgba(248,245,250,.55);cursor:default}
.mcell.other .mcn{color:#d8c8d8}
.mcell.mtoday{background:rgba(255,232,244,.6)}
.mcell.has-t{background:rgba(255,246,251,.8)}
.mcn{font-size:.75rem;font-weight:700;color:#5a3f5a;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.mcn-circle{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#ffb3d1,#f06292);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;box-shadow:0 1px 5px rgba(240,98,146,.3)}
.mcnt{font-size:.55rem;background:rgba(255,183,210,.3);color:#f06292;padding:1px 4px;border-radius:50px;font-weight:700}
.mchips{display:flex;flex-direction:column;gap:1px}
.mchip{border-radius:3px;padding:1px 4px;font-size:.58rem;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MONTH SUMMARY ── */
.mstat-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem}
.mwcards{display:flex;flex-direction:column;gap:.55rem}
.mwcard{background:rgba(255,255,255,.88);border-radius:13px;border:1.5px solid rgba(255,183,210,.22);overflow:hidden;box-shadow:0 2px 8px rgba(200,130,180,.07)}
.mwc-hd{padding:.5rem .9rem;background:linear-gradient(135deg,rgba(255,230,242,.55),rgba(230,244,255,.45));border-bottom:1px solid rgba(255,183,210,.15);display:flex;align-items:center;justify-content:space-between}
.mwc-lbl{font-size:.75rem;font-weight:700;color:#5a3f5a}
.mwc-cnt{font-size:.65rem;color:#c0a0c0;background:#fff;padding:1px 8px;border-radius:50px;border:1px solid rgba(255,183,210,.18)}
.mwc-bd{padding:.65rem .9rem}
.mwt{display:flex;gap:7px;align-items:flex-start;padding:4px 0;border-bottom:1px dashed rgba(255,183,210,.15)}
.mwt:last-child{border-bottom:none}
.mwt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.mwt-info{flex:1}
.mwt-date{font-size:.62rem;color:#c0a0c0;margin-bottom:1px}
.mwt-txt{font-size:.75rem;color:#5a3f5a;line-height:1.4}
.mwt-img{width:100%;max-height:55px;object-fit:cover;border-radius:5px;margin-top:3px}
.m-empty{text-align:center;padding:2rem;color:#c0a0c0;font-size:.82rem}

/* ── MODAL ── */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(90,40,90,.18);z-index:100;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;width:390px;max-width:93vw;max-height:88vh;overflow-y:auto;border:1.5px solid rgba(255,183,210,.38);box-shadow:0 14px 44px rgba(200,100,160,.16)}
.m-hd{padding:.9rem 1.1rem .75rem;background:linear-gradient(135deg,rgba(255,230,242,.65),rgba(230,244,255,.55));border-bottom:1px solid rgba(255,183,210,.18);display:flex;align-items:center;justify-content:space-between}
.m-title{font-size:.88rem;font-weight:700;color:#5a3f5a;display:flex;align-items:center;gap:6px}
.ebadge{font-size:.6rem;background:#e2d4ff;color:#6040a8;padding:2px 7px;border-radius:50px;font-weight:700}
.m-cls{width:24px;height:24px;border-radius:50%;border:1px solid #ffb3d1;background:#fff;cursor:pointer;font-size:.75rem;color:#c0a0c0;display:flex;align-items:center;justify-content:center}
.m-cls:hover{background:#fff0f6;color:#f06292}
.m-bd{padding:1rem 1.1rem}
.m-dlbl{font-size:.72rem;color:#c0a0c0;margin-bottom:.75rem;font-weight:500}
.m-dlbl span{color:#f06292;font-weight:700}
textarea{width:100%;padding:.6rem .8rem;border-radius:10px;border:1.5px solid rgba(255,183,210,.42);background:#fff;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:.83rem;color:#5a3f5a;outline:none;resize:vertical;min-height:78px;line-height:1.6}
textarea:focus{border-color:#ff85b3;box-shadow:0 0 0 3px rgba(255,133,179,.1)}
.uarea{margin-top:.75rem;border:2px dashed rgba(255,183,210,.48);border-radius:11px;padding:.85rem;text-align:center;background:rgba(255,240,246,.22);cursor:pointer}
.uarea:hover{border-color:#ff85b3;background:rgba(255,220,238,.32)}
.uarea input{display:none}
.uico{font-size:1.3rem;margin-bottom:2px}
.utxt{font-size:.72rem;color:#c0a0c0}
.utxt b{color:#f06292}
.prevs{display:flex;flex-wrap:wrap;gap:6px;margin-top:.6rem}
.pw{position:relative;width:68px;height:68px}
.pw img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1.5px solid #ffdaec}
.pd{position:absolute;top:-4px;right:-4px;width:15px;height:15px;border-radius:50%;background:#f06292;color:#fff;font-size:.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid #fff}
.cr{display:flex;gap:5px;margin-top:.75rem;align-items:center}
.clbl{font-size:.7rem;color:#c0a0c0}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2.5px solid transparent}
.cdot:hover{transform:scale(1.2)}
.cdot.on{border-color:#7a5a7a;transform:scale(1.12)}
.m-ft{display:flex;gap:.45rem;justify-content:flex-end;margin-top:.85rem}
.btn{padding:.45rem 1.05rem;border-radius:50px;border:none;cursor:pointer;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:.78rem;font-weight:700}
.btn-c{background:transparent;color:#7a5a7a;border:1.5px solid rgba(200,160,200,.32)}.btn-c:hover{background:#fff0f6}
.btn-s{background:linear-gradient(135deg,#ffb3d1,#f06292);color:#fff;box-shadow:0 3px 10px rgba(240,98,146,.25)}.btn-s:hover{box-shadow:0 5px 14px rgba(240,98,146,.35)}
.btn-s:disabled{opacity:.6;cursor:not-allowed}

/* ── IMAGE VIEWER ── */
.imgov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,10,20,.72);z-index:200;align-items:center;justify-content:center}
.imgov.on{display:flex}
.imgov-in{position:relative;max-width:90vw;max-height:88vh}
.imgov-in img{max-width:90vw;max-height:85vh;border-radius:13px;display:block;box-shadow:0 14px 44px rgba(0,0,0,.4)}
.imgov-cls{position:absolute;top:-12px;right:-12px;width:26px;height:26px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:.8rem;color:#5a3f5a;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* ── TOAST ── */
.toast{position:fixed;top:64px;right:1.1rem;background:#fff;border:1.5px solid rgba(255,183,210,.42);border-radius:10px;padding:.5rem .95rem;font-size:.76rem;color:#5a3f5a;box-shadow:0 4px 18px rgba(200,130,180,.13);z-index:300;transform:translateX(130%);transition:transform .24s ease}
.toast.on{transform:translateX(0)}

@media print{
  .hdr,.overlay,.imgov,.toast{display:none!important}
  body,body::before,body::after{background:white!important}
  .main{padding:0!important}
  .grid-wrap,.sum-card,.mwcard{box-shadow:none!important}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Image viewer -->
<div class="imgov" id="imgov" onclick="if(event.target===this)closeImg()">
  <div class="imgov-in">
    <button class="imgov-cls" onclick="closeImg()">✕</button>
    <img id="imgov-src" src="" alt="">
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-hd">
      <div class="m-title" id="m-title">✏️ Add Task</div>
      <button class="m-cls" onclick="closeModal()">✕</button>
    </div>
    <div class="m-bd">
      <div class="m-dlbl">📅 <span id="m-date"></span></div>
      <textarea id="m-txt" placeholder="Describe your task…"></textarea>
      <div class="uarea" onclick="document.getElementById('finp').click()">
        <input type="file" id="finp" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div class="uico">🖼️</div>
        <div class="utxt">Tap to add images · <b>PNG JPG WEBP</b></div>
      </div>
      <div class="prevs" id="prevs"></div>
      <div class="cr">
        <span class="clbl">Color</span>
        <div class="cdot on"  style="background:#f06292" data-c="cpink"     onclick="pickC(this)"></div>
        <div class="cdot"     style="background:#60a0f0" data-c="cblue"     onclick="pickC(this)"></div>
        <div class="cdot"     style="background:#40c090" data-c="cmint"     onclick="pickC(this)"></div>
        <div class="cdot"     style="background:#9070e0" data-c="clavender" onclick="pickC(this)"></div>
        <div class="cdot"     style="background:#f09050" data-c="cpeach"    onclick="pickC(this)"></div>
      </div>
      <div class="m-ft">
        <button class="btn btn-c" onclick="closeModal()">Cancel</button>
        <button class="btn btn-s" id="sbtn"  onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>
</div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ico">🌸</div>
      <div><div class="logo-t">Intern Planner</div><div class="logo-s">Weekly Task Board</div></div>
    </div>
    <div class="nav-c">
      <button class="wbtn" id="prev-btn" onclick="navPrev()">◀</button>
      <div class="nav-lbl" id="nav-lbl"></div>
      <button class="wbtn" id="next-btn" onclick="navNext()">▶</button>
      <button class="tbtn" onclick="goToday()">Today</button>
    </div>
    <div class="nav-r">
      <div class="vtabs">
        <button class="vtab on" id="tab-w" onclick="switchView('w')">Weekly</button>
        <button class="vtab"    id="tab-m" onclick="switchView('m')">Monthly</button>
      </div>
      <button class="expbtn" onclick="window.print()">🖨️ Export</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="view on" id="view-w">
    <div class="grid-wrap">
      <div class="grid-hdr" id="ghdr"></div>
      <div class="grid-body" id="gbdy"></div>
    </div>
    <div class="sec-title">Weekly Summary</div>
    <div class="sum-grid" id="wsum"></div>
    <div class="stat-row" id="wstat"></div>
  </div>

  <div class="view" id="view-m">
    <div class="month-nav">
      <button class="wbtn" onclick="navPrev()">◀</button>
      <div class="month-lbl" id="m-lbl"></div>
      <button class="wbtn" onclick="navNext()">▶</button>
    </div>
    <div class="mcal"  id="mcal"></div>
    <div class="sec-title">Monthly Summary</div>
    <div class="mstat-row" id="mstat"></div>
    <div class="mwcards"   id="mwcards"></div>
  </div>
</div>

<script>
var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var LS     = 'intern_planner_v5';
var CBGMAP = {cpink:'#ffd6e8',cblue:'#d6eaff',cmint:'#d0f4e8',clavender:'#e2d4ff',cpeach:'#ffe4d0'};
var CTXMAP = {cpink:'#b84070',cblue:'#2860a8',cmint:'#1a7a55',clavender:'#6040a8',cpeach:'#a05020'};
var CDOTMAP= {cpink:'#f06292',cblue:'#60a0f0',cmint:'#40c090',clavender:'#9070e0',cpeach:'#f09050'};

var tasks    = {};
var curView  = 'w';
var weekOff  = 0;
var monthOff = 0;
var mDate    = null;
var editIdx  = null;
var selC     = 'cpink';
var pImgs    = [];
var MAX_PX   = 1200;
var IMG_Q    = 0.72;

// ── STORAGE ──────────────────────────────────────────────────────
function load() {
  try { tasks = JSON.parse(localStorage.getItem(LS) || '{}'); } catch(e) { tasks = {}; }
}
function save() {
  localStorage.setItem(LS, JSON.stringify(tasks));
}

// ── DATE HELPERS ─────────────────────────────────────────────────
function dk(d)       { return d.toISOString().split('T')[0]; }
function isToday(d)  { return dk(d) === dk(new Date()); }
function isWk(d)     { return d.getDay()===0||d.getDay()===6; }
function fmtS(d)     { return DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]; }
function fmtWRange(days) {
  var s=days[0],e=days[6];
  return s.getDate()+' '+MONTHS[s.getMonth()]+' — '+e.getDate()+' '+MONTHS[e.getMonth()]+' '+e.getFullYear();
}
function getWDays(off) {
  var now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  var a=[];
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);a.push(d);}
  return a;
}
function getMonStart(off) {
  var now=new Date();
  return new Date(now.getFullYear(),now.getMonth()+off,1);
}

// ── VIEW SWITCH ──────────────────────────────────────────────────
function switchView(v) {
  curView = v;
  document.getElementById('view-w').className = 'view'+(v==='w'?' on':'');
  document.getElementById('view-m').className = 'view'+(v==='m'?' on':'');
  document.getElementById('tab-w').className  = 'vtab'+(v==='w'?' on':'');
  document.getElementById('tab-m').className  = 'vtab'+(v==='m'?' on':'');
  render();
}

function navPrev() { if(curView==='w') weekOff--;  else monthOff--; render(); }
function navNext() { if(curView==='w') weekOff++;  else monthOff++; render(); }
function goToday() { weekOff=0; monthOff=0; render(); }

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  if(curView==='w') renderWeek(); else renderMonth();
}

// ── WEEKLY ───────────────────────────────────────────────────────
function renderWeek() {
  var days = getWDays(weekOff);
  document.getElementById('nav-lbl').textContent = fmtWRange(days);
  var hh='<div class="g-corner"></div>';
  days.forEach(function(d){
    var tc=isToday(d)?' is-today':'';
    var ne=isToday(d)?'<div class="g-num tday">'+d.getDate()+'</div>':'<div class="g-num">'+d.getDate()+'</div>';
    hh+='<div class="g-dhead'+tc+'" onclick="openM(\''+dk(d)+'\',\''+fmtS(d)+'\')"><div class="g-dn">'+DAYS[d.getDay()]+'</div>'+ne+'<div class="g-mo">'+MONTHS[d.getMonth()]+'</div></div>';
  });
  document.getElementById('ghdr').innerHTML=hh;

  var bh='<div class="g-rlbl">TASKS</div>';
  days.forEach(function(d){
    var key=dk(d),dt=tasks[key]||[];
    var cl='g-cell'+(isToday(d)?' tc':'')+(isWk(d)?' wk':'');
    var chips=dt.map(function(t,i){
      var imgs=(t.images||[]).map(function(img,ii){
        return '<img class="chip-img" src="'+img+'" onclick="event.stopPropagation();viewImg(\''+key+'\','+i+','+ii+')" alt="">';
      }).join('');
      return '<div class="chip '+(t.color||'cpink')+'" onclick="event.stopPropagation()">'+imgs+'<div class="chip-txt">'+esc(t.text)+'</div><div class="chip-acts"><button class="cbtn cedit" onclick="event.stopPropagation();openEdit(\''+key+'\','+i+')">✎</button><button class="cbtn cdel" onclick="event.stopPropagation();delTask(\''+key+'\','+i+')">✕</button></div></div>';
    }).join('');
    bh+='<div class="'+cl+'" onclick="openM(\''+dk(d)+'\',\''+fmtS(d)+'\')">'+chips+'<div class="add-h">+ add task</div></div>';
  });
  document.getElementById('gbdy').innerHTML=bh;

  var total=0;
  var sc=days.map(function(d){
    var key=dk(d),dt=tasks[key]||[];total+=dt.length;
    var wk=isWk(d)?' wk':'';
    var items=dt.length?'<ul class="sum-ul">'+dt.map(function(t){
      var th=(t.images&&t.images.length)?'<img class="sum-img" src="'+t.images[0]+'" alt="">':'';
      return '<li>'+th+'<span>'+esc(t.text)+'</span></li>';
    }).join('')+'</ul>':'<div class="sum-empty">—</div>';
    return '<div class="sum-card'+wk+'"><div class="sum-day">'+DAYS[d.getDay()]+' '+d.getDate()+'</div>'+items+'</div>';
  });
  document.getElementById('wsum').innerHTML=sc.join('');
  var wd=days.filter(function(d){return(tasks[dk(d)]||[]).length>0;}).length;
  document.getElementById('wstat').innerHTML='<div class="spill">Total: <b>'+total+'</b></div><div class="spill">Days with tasks: <b>'+wd+' / 7</b></div>';
}

// ── MONTHLY ──────────────────────────────────────────────────────
function renderMonth() {
  var ms=getMonStart(monthOff),y=ms.getFullYear(),mo=ms.getMonth();
  document.getElementById('nav-lbl').textContent=MONTHS[mo]+' '+y;
  document.getElementById('m-lbl').textContent=MONTHS[mo]+' '+y;

  var dim=new Date(y,mo+1,0).getDate();
  var fd=new Date(y,mo,1).getDay();
  var off=(fd===0)?6:fd-1;
  var todStr=dk(new Date());

  // Calendar
  var h='';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){h+='<div class="mcal-dh">'+d+'</div>';});
  var total=Math.ceil((off+dim)/7)*7;
  for(var i=0;i<total;i++){
    var dn=i-off+1;
    var cd=new Date(y,mo,dn);
    var key=dk(cd);
    var inMo=(dn>=1&&dn<=dim);
    var isTod=(key===todStr);
    var dt=tasks[key]||[];
    var cls='mcell'+(inMo?'':' other')+(isTod?' mtoday':'')+(inMo&&dt.length?' has-t':'');
    var numEl=isTod?'<span class="mcn-circle">'+cd.getDate()+'</span>':cd.getDate();
    var cntEl=(inMo&&dt.length)?'<span class="mcnt">'+dt.length+'</span>':'';
    var chipsEl='';
    if(inMo&&dt.length){
      chipsEl='<div class="mchips">';
      dt.slice(0,2).forEach(function(t){
        var bg=CBGMAP[t.color]||'#ffd6e8',col=CTXMAP[t.color]||'#b84070';
        chipsEl+='<div class="mchip" style="background:'+bg+';color:'+col+'">'+esc(t.text)+'</div>';
      });
      if(dt.length>2)chipsEl+='<div style="font-size:.52rem;color:#c0a0c0;padding:1px 2px">+'+(dt.length-2)+' more</div>';
      chipsEl+='</div>';
    }
    var click=inMo?'onclick="openM(\''+key+'\',\''+fmtS(cd)+'\')"':'';
    h+='<div class="'+cls+'" '+click+'><div class="mcn">'+numEl+cntEl+'</div>'+chipsEl+'</div>';
  }
  document.getElementById('mcal').innerHTML=h;

  // Monthly summary
  var allTasks=[];
  for(var d2=1;d2<=dim;d2++){
    var dd=new Date(y,mo,d2),kk=dk(dd);
    (tasks[kk]||[]).forEach(function(t){allTasks.push({date:kk,d:new Date(dd),t:t});});
  }
  var activeDays=Object.keys(tasks).filter(function(k){
    return k.startsWith(y+'-'+String(mo+1).padStart(2,'0'))&&(tasks[k]||[]).length>0;
  }).length;
  var cc={};
  allTasks.forEach(function(it){var c=it.t.color||'cpink';cc[c]=(cc[c]||0)+1;});
  var cpills=Object.keys(cc).map(function(c){
    var bg=CBGMAP[c]||'#ffd6e8',col=CTXMAP[c]||'#b84070';
    var nm=c.replace('c','');nm=nm.charAt(0).toUpperCase()+nm.slice(1);
    return '<span class="spill" style="border-color:'+bg+'"><span style="color:'+col+';font-weight:700">'+nm+'</span>: <b>'+cc[c]+'</b></span>';
  }).join('');
  document.getElementById('mstat').innerHTML='<div class="spill">Total tasks: <b>'+allTasks.length+'</b></div><div class="spill">Active days: <b>'+activeDays+'</b></div>'+cpills;

  // Weekly breakdown
  if(!allTasks.length){document.getElementById('mwcards').innerHTML='<div class="m-empty">🌸 No tasks this month</div>';return;}
  var weeks=[];
  var cur=new Date(y,mo,1);
  var dow=cur.getDay();cur.setDate(cur.getDate()-(dow===0?6:dow-1));
  var last=new Date(y,mo+1,0);
  while(cur<=last){
    var ws=new Date(cur),we=new Date(cur);we.setDate(cur.getDate()+6);
    var wt=[];
    for(var di=0;di<7;di++){
      var dd2=new Date(cur);dd2.setDate(cur.getDate()+di);
      if(dd2.getMonth()===mo){(tasks[dk(dd2)]||[]).forEach(function(t){wt.push({d:new Date(dd2),t:t});});}
    }
    if(wt.length)weeks.push({s:ws,e:we,items:wt});
    cur.setDate(cur.getDate()+7);
  }
  document.getElementById('mwcards').innerHTML=weeks.map(function(w){
    var lbl=w.s.getDate()+' '+MONTHS[w.s.getMonth()]+' — '+w.e.getDate()+' '+MONTHS[w.e.getMonth()];
    var rows=w.items.map(function(it){
      var dot=CDOTMAP[it.t.color]||'#f06292';
      var img=(it.t.images&&it.t.images.length)?'<img class="mwt-img" src="'+it.t.images[0]+'" alt="">':'';
      return '<div class="mwt"><div class="mwt-dot" style="background:'+dot+'"></div><div class="mwt-info"><div class="mwt-date">'+DAYS[it.d.getDay()]+' '+it.d.getDate()+' '+MONTHS[it.d.getMonth()]+'</div><div class="mwt-txt">'+esc(it.t.text)+'</div>'+img+'</div></div>';
    }).join('');
    return '<div class="mwcard"><div class="mwc-hd"><span class="mwc-lbl">📅 '+lbl+'</span><span class="mwc-cnt">'+w.items.length+' tasks</span></div><div class="mwc-bd">'+rows+'</div></div>';
  }).join('');
}

// ── MODAL ────────────────────────────────────────────────────────
function openM(key,lbl){
  mDate=key;editIdx=null;pImgs=[];
  document.getElementById('m-title').innerHTML='✏️ Add Task';
  document.getElementById('m-date').textContent=lbl;
  document.getElementById('m-txt').value='';
  document.getElementById('prevs').innerHTML='';
  document.getElementById('finp').value='';
  document.getElementById('sbtn').disabled=false;
  document.getElementById('sbtn').textContent='Save Task';
  selC='cpink';
  document.querySelectorAll('.cdot').forEach(function(d,i){d.classList.toggle('on',i===0);});
  document.getElementById('overlay').classList.add('on');
  setTimeout(function(){document.getElementById('m-txt').focus();},80);
}
function openEdit(key,idx){
  var t=(tasks[key]||[])[idx];if(!t)return;
  mDate=key;editIdx=idx;pImgs=(t.images||[]).slice();
  document.getElementById('m-title').innerHTML='✏️ Edit Task <span class="ebadge">editing</span>';
  document.getElementById('m-date').textContent=key;
  document.getElementById('m-txt').value=t.text||'';
  document.getElementById('finp').value='';
  document.getElementById('sbtn').disabled=false;
  document.getElementById('sbtn').textContent='Save Task';
  selC=t.color||'cpink';
  document.querySelectorAll('.cdot').forEach(function(d){d.classList.toggle('on',d.dataset.c===selC);});
  renderPrevs();
  document.getElementById('overlay').classList.add('on');
  setTimeout(function(){document.getElementById('m-txt').focus();},80);
}
function closeModal(){document.getElementById('overlay').classList.remove('on');mDate=null;editIdx=null;}

// ── SAVE ─────────────────────────────────────────────────────────
function saveTask(){
  var txt=document.getElementById('m-txt').value.trim();
  if(!txt&&!pImgs.length){showToast('⚠️ Please add a task or image');return;}
  if(!tasks[mDate])tasks[mDate]=[];
  var entry={text:txt||'(image)',color:selC,images:pImgs.slice()};
  var isEdit=editIdx!==null;
  if(isEdit)tasks[mDate][editIdx]=entry; else tasks[mDate].push(entry);
  save();render();closeModal();
  showToast(isEdit?'✅ Updated!':'🌸 Saved!');
}
function delTask(key,idx){
  if(!confirm('Delete this task?'))return;
  tasks[key].splice(idx,1);
  if(!tasks[key].length)delete tasks[key];
  save();render();
}

// ── IMAGES ───────────────────────────────────────────────────────
function handleFiles(files){
  Array.from(files).forEach(function(f){
    if(!f.type.startsWith('image/'))return;
    compress(f,function(r){pImgs.push(r);renderPrevs();});
  });
}
function compress(file,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>MAX_PX||h>MAX_PX){if(w>h){h=Math.round(h*MAX_PX/w);w=MAX_PX;}else{w=Math.round(w*MAX_PX/h);h=MAX_PX;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',IMG_Q));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function renderPrevs(){
  document.getElementById('prevs').innerHTML=pImgs.map(function(s,i){
    return '<div class="pw"><img src="'+s+'" alt=""><div class="pd" onclick="rmP('+i+')">✕</div></div>';
  }).join('');
}
function rmP(i){pImgs.splice(i,1);renderPrevs();}
function viewImg(key,ti,ii){
  document.getElementById('imgov-src').src=tasks[key][ti].images[ii];
  document.getElementById('imgov').classList.add('on');
}
function closeImg(){document.getElementById('imgov').classList.remove('on');}

// ── UTILS ─────────────────────────────────────────────────────────
function pickC(el){document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('on');});el.classList.add('on');selC=el.dataset.c;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── START ─────────────────────────────────────────────────────────
load();
render();
</script>
